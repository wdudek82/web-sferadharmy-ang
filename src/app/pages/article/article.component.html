<section class="section article">
  <div class="article-shell">
    @if (isLoading()) {
      <p class="article-status">Wczytywanie tekstu…</p>
    } @else if (notFound()) {
      <p class="article-status">Nie znaleziono tego tekstu.</p>
    } @else {
      <div class="article-content" (click)="onArticleClick($event)">
        <markdown [data]="content()" />
      </div>
    }
  </div>
</section>
@if (lightboxOpen()) {
  <div class="lightbox" role="dialog" aria-modal="true" (click)="closeLightbox()">
    <button class="lightbox-close" type="button" (click)="closeLightbox()" aria-label="Zamknij">
      Zamknij
    </button>
    <figure class="lightbox-figure" (click)="$event.stopPropagation()">
      <img
        [src]="lightboxSrc()"
        [alt]="lightboxCaption()"
        [attr.width]="lightboxWidth()"
        [attr.height]="lightboxHeight()"
      />
      @if (lightboxCaption()) {
        <figcaption>{{ lightboxCaption() }}</figcaption>
      }
    </figure>
  </div>
}
