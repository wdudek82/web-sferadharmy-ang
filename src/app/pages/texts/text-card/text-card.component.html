<article class="text-card" [class.is-visible]="isVisible()">
  <a class="text-media" [routerLink]="href">
    <img
      [ngSrc]="text.thumbnail"
      [alt]="text.title"
      width="640"
      height="420"
      sizes="(max-width: 900px) 90vw, 33vw"
    />
  </a>
  <div class="text-content">
    <div class="text-meta">
      <span>{{ text.date }}</span>
      @if (text.time) {
        <span aria-hidden="true">&middot;</span>
      }
      <span>{{ text.time }}</span>
    </div>
    <a class="text-title" [routerLink]="href">
      <h3>{{ text.title }}</h3>
    </a>
    <p>
      {{ text.excerpt | slice: 0 : 200 }}
      @if (text.excerpt.length > 200) {
        …
      }
    </p>
    <a class="text-link" [routerLink]="href">Czytaj</a>
  </div>
</article>
